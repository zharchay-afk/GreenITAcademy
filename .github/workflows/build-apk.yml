name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:   # Permet de lancer manuellement depuis GitHub

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets for native (base URL = /)
        run: npm run build:native

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Copy web assets to Android project
        run: npx cap copy android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenITAcademie-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "✅ APK généré avec succès !"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
